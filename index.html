<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tareas Claude — HyperTrader</title>
    <style>
        :root {
            --bg:           #0d0d14;
            --surface:      #13131e;
            --surface2:     #1a1a28;
            --border:       #252535;
            --text:         #e2e8f0;
            --text-muted:   #64748b;
            --text-dim:     #94a3b8;
            --alta:         #ef4444;
            --alta-bg:      rgba(239,68,68,0.10);
            --media:        #f59e0b;
            --media-bg:     rgba(245,158,11,0.10);
            --baja:         #3b82f6;
            --baja-bg:      rgba(59,130,246,0.10);
            --bloqueado:    #8b5cf6;
            --bloqueado-bg: rgba(139,92,246,0.10);
            --success:      #22c55e;
            --success-bg:   rgba(34,197,94,0.10);
            --accent:       #6366f1;
            --accent-bg:    rgba(99,102,241,0.10);
            --radius:       10px;
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            line-height: 1.5;
        }

        /* ── Header ────────────────────────────────────────────────────── */
        .header {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 15px 26px;
            display: flex;
            align-items: center;
            gap: 18px;
            position: sticky; top: 0; z-index: 100;
        }

        .logo { display: flex; align-items: center; gap: 11px; }

        .logo-icon {
            width: 34px; height: 34px;
            background: linear-gradient(135deg, var(--accent), #8b5cf6);
            border-radius: 9px;
            display: flex; align-items: center; justify-content: center;
            font-size: 16px; flex-shrink: 0;
        }
        .logo-name { font-size: 16px; font-weight: 700; letter-spacing: -0.3px; }
        .logo-name span { color: var(--accent); }
        .logo-sub  { font-size: 10.5px; color: var(--text-muted); }

        .header-stats { display: flex; gap: 18px; margin-left: auto; }
        .stat { text-align: center; }
        .stat-num { font-size: 21px; font-weight: 800; line-height: 1; letter-spacing: -1px; }
        .stat-num.active { color: var(--accent); }
        .stat-num.done   { color: var(--success); }
        .stat-label { font-size: 10px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; }

        /* ── Sync pill ──────────────────────────────────────────────────── */
        .sync-wrap { position: relative; }

        .sync-pill {
            display: flex; align-items: center; gap: 7px;
            padding: 6px 13px;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 20px;
            font-size: 12px; font-weight: 600;
            cursor: pointer; color: var(--text-muted);
            transition: all .15s; white-space: nowrap; font-family: inherit;
        }
        .sync-pill:hover { border-color: var(--accent); color: var(--text); }
        .sync-pill.synced  { border-color: rgba(34,197,94,0.35); color: var(--success); background: var(--success-bg); }
        .sync-pill.syncing { border-color: rgba(99,102,241,0.35); color: var(--accent); background: var(--accent-bg); }
        .sync-pill.error   { border-color: rgba(245,158,11,0.35); color: var(--media); background: var(--media-bg); }

        .sync-dot {
            width: 7px; height: 7px; border-radius: 50%;
            background: var(--text-muted); flex-shrink: 0;
            transition: background .3s;
        }
        .sync-pill.synced  .sync-dot { background: var(--success); }
        .sync-pill.syncing .sync-dot { background: var(--accent); animation: pulse 1s infinite; }
        .sync-pill.error   .sync-dot { background: var(--media); }

        @keyframes pulse {
            0%,100% { opacity: 1; transform: scale(1); }
            50%      { opacity: .4; transform: scale(0.7); }
        }

        /* ── Sync dropdown panel ────────────────────────────────────────── */
        .sync-panel {
            position: absolute; top: calc(100% + 10px); right: 0;
            width: 300px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            box-shadow: 0 12px 40px rgba(0,0,0,0.5);
            z-index: 200;
            overflow: hidden;
            opacity: 0; pointer-events: none;
            transform: translateY(-6px);
            transition: opacity .15s, transform .15s;
        }
        .sync-panel.open { opacity: 1; pointer-events: all; transform: translateY(0); }

        .sync-panel-head {
            padding: 14px 16px 10px;
            border-bottom: 1px solid var(--border);
            font-size: 12px; font-weight: 700;
            color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px;
        }
        .sync-panel-body { padding: 14px 16px; display: flex; flex-direction: column; gap: 10px; }

        .sync-info {
            font-size: 12px; color: var(--text-dim); line-height: 1.5;
        }
        .sync-info strong { color: var(--text); }

        .sync-input-row { display: flex; gap: 8px; }

        .sync-input {
            flex: 1;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 7px;
            padding: 8px 10px;
            color: var(--text); font-size: 12.5px;
            font-family: 'SF Mono', monospace;
            transition: border-color .15s;
        }
        .sync-input:focus { outline: none; border-color: var(--accent); }

        .sync-btn-primary {
            padding: 8px 14px;
            background: var(--accent); color: #fff;
            border: none; border-radius: 7px;
            font-size: 12.5px; font-weight: 700;
            cursor: pointer; transition: background .13s; font-family: inherit;
            white-space: nowrap;
        }
        .sync-btn-primary:hover { background: #4f46e5; }

        .sync-status-row {
            display: flex; align-items: center; gap: 10px;
            padding: 10px 12px;
            background: var(--surface2); border-radius: 8px;
            border: 1px solid var(--border);
        }
        .sync-status-icon { font-size: 16px; flex-shrink: 0; }
        .sync-status-text { flex: 1; font-size: 12px; color: var(--text-dim); }
        .sync-status-text strong { display: block; color: var(--text); font-size: 12.5px; }

        .sync-btn-danger {
            padding: 5px 10px;
            background: var(--alta-bg); color: var(--alta);
            border: 1px solid transparent; border-radius: 6px;
            font-size: 11px; font-weight: 700;
            cursor: pointer; transition: background .13s; font-family: inherit;
        }
        .sync-btn-danger:hover { background: rgba(239,68,68,0.2); }

        .sync-last {
            font-size: 11px; color: var(--text-muted);
            text-align: center;
        }

        /* ── Header actions ─────────────────────────────────────────────── */
        .header-actions { display: flex; gap: 7px; }

        .btn-header {
            display: flex; align-items: center; gap: 5px;
            padding: 6px 12px;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 7px;
            color: var(--text-muted);
            font-size: 11.5px; font-weight: 600;
            cursor: pointer; white-space: nowrap;
            transition: all .15s; font-family: inherit;
        }
        .btn-header:hover { background: var(--border); color: var(--text); }

        /* ── Container ──────────────────────────────────────────────────── */
        .container { max-width: 860px; margin: 0 auto; padding: 26px 20px 60px; }

        /* ── Claude context bar ─────────────────────────────────────────── */
        .context-bar {
            background: linear-gradient(135deg, rgba(99,102,241,0.07), rgba(139,92,246,0.07));
            border: 1px solid rgba(99,102,241,0.20);
            border-radius: var(--radius);
            padding: 11px 16px;
            margin-bottom: 18px;
            display: flex; align-items: center; gap: 12px;
        }
        .context-bar-icon { font-size: 18px; flex-shrink: 0; }
        .context-bar-text { font-size: 12px; color: var(--text-dim); line-height: 1.5; flex: 1; }
        .context-bar-text strong {
            color: var(--accent);
            font-family: 'SF Mono', monospace; font-size: 11px;
            background: rgba(99,102,241,0.12);
            padding: 1px 5px; border-radius: 4px;
        }
        .btn-copy-prompt {
            padding: 5px 11px;
            background: var(--accent-bg);
            border: 1px solid rgba(99,102,241,0.22);
            border-radius: 6px;
            color: var(--accent); font-size: 11px; font-weight: 700;
            cursor: pointer; white-space: nowrap;
            transition: all .15s; font-family: inherit; flex-shrink: 0;
        }
        .btn-copy-prompt:hover { background: rgba(99,102,241,0.18); }

        /* ── Add-task bar ───────────────────────────────────────────────── */
        .add-bar {
            background: var(--surface);
            border: 1.5px dashed var(--border);
            border-radius: var(--radius);
            padding: 12px 17px;
            margin-bottom: 24px;
            display: flex; align-items: center; gap: 11px;
            cursor: pointer; transition: border-color .18s, background .18s; user-select: none;
        }
        .add-bar:hover { border-color: var(--accent); background: var(--surface2); }

        .add-bar-icon {
            width: 27px; height: 27px;
            background: var(--accent-bg); border: 1px solid rgba(99,102,241,0.22);
            border-radius: 7px; display: flex; align-items: center; justify-content: center;
            color: var(--accent); font-size: 19px; font-weight: 300; flex-shrink: 0; line-height: 1;
        }
        .add-bar-text { color: var(--text-muted); font-size: 13.5px; flex: 1; }
        .add-bar-shortcut {
            background: var(--surface2); border: 1px solid var(--border);
            border-radius: 5px; padding: 2px 7px;
            font-size: 10.5px; color: var(--text-muted); font-family: monospace;
        }

        /* ── Section header ─────────────────────────────────────────────── */
        .section-header { display: flex; align-items: center; gap: 9px; margin-bottom: 13px; }
        .section-title {
            font-size: 11px; font-weight: 700; text-transform: uppercase;
            letter-spacing: 0.9px; color: var(--text-muted);
        }
        .section-badge {
            background: var(--surface2); border: 1px solid var(--border);
            border-radius: 20px; padding: 2px 8px;
            font-size: 10.5px; font-weight: 700; color: var(--text-muted);
        }
        .section-badge.done-badge { background: var(--success-bg); border-color: rgba(34,197,94,0.2); color: var(--success); }
        .section-toggle {
            margin-left: auto; background: none; border: none;
            color: var(--text-muted); cursor: pointer; font-size: 14px;
            padding: 3px 5px; border-radius: 4px; transition: color .15s, background .15s; line-height: 1;
        }
        .section-toggle:hover { background: var(--surface2); color: var(--text); }

        /* ── Tasks list ─────────────────────────────────────────────────── */
        .tasks-list { display: flex; flex-direction: column; gap: 9px; }

        /* ── Task card ──────────────────────────────────────────────────── */
        .task-card {
            background: var(--surface); border: 1px solid var(--border);
            border-left: 3px solid transparent; border-radius: var(--radius);
            overflow: hidden; animation: slideIn .2s ease;
        }
        @keyframes slideIn { from { opacity:0; transform:translateY(-5px); } to { opacity:1; transform:translateY(0); } }
        .task-card.removing { animation: slideOut .22s ease forwards; }
        @keyframes slideOut { to { opacity:0; transform:translateX(12px); max-height:0; margin:0; border:none; } }

        .task-card[data-prioridad="ALTA"]      { border-left-color: var(--alta); }
        .task-card[data-prioridad="MEDIA"]     { border-left-color: var(--media); }
        .task-card[data-prioridad="BAJA"]      { border-left-color: var(--baja); }
        .task-card[data-prioridad="BLOQUEADO"] { border-left-color: var(--bloqueado); }

        .task-main { padding: 13px 16px; }
        .task-top  { display: flex; align-items: flex-start; gap: 9px; margin-bottom: 7px; }

        .badge {
            padding: 2px 7px; border-radius: 4px;
            font-size: 9.5px; font-weight: 800; letter-spacing: 0.4px;
            text-transform: uppercase; flex-shrink: 0; margin-top: 2px;
        }
        .badge-alta      { background: var(--alta-bg);      color: var(--alta); }
        .badge-media     { background: var(--media-bg);     color: var(--media); }
        .badge-baja      { background: var(--baja-bg);      color: var(--baja); }
        .badge-bloqueado { background: var(--bloqueado-bg); color: var(--bloqueado); }
        .badge-pendiente { background: var(--surface2);     color: var(--text-muted); }
        .badge-progreso  { background: var(--accent-bg);    color: var(--accent); }

        .task-title  { font-size: 14px; font-weight: 600; flex: 1; line-height: 1.3; }
        .task-actions { display: flex; gap: 5px; flex-shrink: 0; align-items: center; }

        .btn-icon {
            width: 26px; height: 26px; border: none; border-radius: 6px;
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            font-size: 12px; transition: background .12s, transform .1s;
        }
        .btn-icon:active { transform: scale(0.9); }
        .btn-complete { background: var(--success-bg); color: var(--success); }
        .btn-complete:hover { background: rgba(34,197,94,0.22); }
        .btn-delete   { background: var(--alta-bg); color: var(--alta); }
        .btn-delete:hover { background: rgba(239,68,68,0.22); }

        .task-project {
            font-family: 'SF Mono', monospace;
            font-size: 10.5px; color: var(--text-muted); margin-bottom: 7px;
            display: flex; align-items: center; gap: 5px;
        }
        .task-project::before { content:''; width:3px; height:3px; background:currentColor; border-radius:50%; flex-shrink:0; }

        .task-description { font-size: 12.5px; color: var(--text-dim); line-height: 1.65; }

        /* ── Expandable details ─────────────────────────────────────────── */
        .task-details { border-top: 1px solid var(--border); max-height:0; overflow:hidden; transition: max-height .3s cubic-bezier(0.4,0,0.2,1); }
        .task-details.open { max-height: 800px; }
        .task-details-inner { padding: 12px 16px; display: flex; flex-direction: column; gap: 11px; }
        .detail-block label { display:block; font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:.7px; color:var(--text-muted); margin-bottom:4px; }
        .detail-block p   { font-size:12px; color:var(--text-dim); line-height:1.6; }
        .detail-block pre {
            font-family:'SF Mono',monospace; font-size:11px; color:var(--text-dim);
            background:var(--surface2); border:1px solid var(--border); border-radius:6px;
            padding:9px 11px; white-space:pre-wrap; word-break:break-all; line-height:1.55;
        }
        .expand-btn {
            width:100%; background:none; border:none; border-top:1px solid var(--border);
            padding:7px; color:var(--text-muted); font-size:11px;
            cursor:pointer; display:flex; align-items:center; justify-content:center;
            gap:5px; transition:background .12s,color .12s; font-family:inherit;
        }
        .expand-btn:hover { background:var(--surface2); color:var(--text); }
        .chevron { display:inline-block; transition:transform .2s; font-size:9px; }
        .chevron.open { transform:rotate(180deg); }

        /* ── Empty state ────────────────────────────────────────────────── */
        .empty-state { text-align:center; padding:40px 20px; color:var(--text-muted); }
        .empty-state-emoji { font-size:32px; margin-bottom:10px; opacity:.4; }
        .empty-state-text  { font-size:13px; }

        /* ── Completed section ──────────────────────────────────────────── */
        .completed-section { margin-top: 36px; }
        .completed-section .section-header { padding-bottom: 11px; border-bottom: 1px solid var(--border); }
        .completed-list { display:flex; flex-direction:column; gap:6px; overflow:hidden; max-height:9999px; transition:max-height .4s ease; }
        .completed-list.collapsed { max-height:0; }

        .completed-card {
            background:var(--surface); border:1px solid var(--border);
            border-left:3px solid var(--success); border-radius:var(--radius);
            padding:9px 14px; display:flex; align-items:center; gap:10px;
            animation:slideIn .18s ease; transition:opacity .2s,transform .2s;
        }
        .check-circle {
            width:20px; height:20px; flex-shrink:0;
            background:var(--success-bg); border:1.5px solid rgba(34,197,94,.32); border-radius:50%;
            display:flex; align-items:center; justify-content:center;
            color:var(--success); font-size:10px; font-weight:700;
        }
        .completed-title { flex:1; font-size:12.5px; color:var(--text-muted); text-decoration:line-through; text-decoration-color:rgba(100,116,139,.4); }
        .completed-date  { font-size:10px; color:var(--text-muted); opacity:.5; white-space:nowrap; flex-shrink:0; }

        /* ── Toast ──────────────────────────────────────────────────────── */
        .toast {
            position:fixed; bottom:26px; left:50%; transform:translateX(-50%) translateY(6px);
            background:var(--surface); border:1px solid var(--border); border-radius:9px;
            padding:9px 18px; font-size:12.5px; color:var(--text);
            box-shadow:0 8px 30px rgba(0,0,0,.4); z-index:9999;
            opacity:0; pointer-events:none; transition:opacity .18s,transform .18s; white-space:nowrap;
        }
        .toast.show  { opacity:1; transform:translateX(-50%) translateY(0); }
        .toast.ok    { border-color:rgba(34,197,94,.3); }
        .toast.warn  { border-color:rgba(245,158,11,.3); }
        .toast.err   { border-color:rgba(239,68,68,.3); }

        /* ── Task modal ─────────────────────────────────────────────────── */
        .overlay {
            position:fixed; inset:0; background:rgba(0,0,0,.72); z-index:999;
            display:flex; align-items:center; justify-content:center; padding:20px;
            opacity:0; pointer-events:none; transition:opacity .18s; backdrop-filter:blur(6px);
        }
        .overlay.open { opacity:1; pointer-events:all; }
        .modal {
            background:var(--surface); border:1px solid var(--border); border-radius:14px;
            width:100%; max-width:530px;
            box-shadow:0 24px 60px rgba(0,0,0,.5);
            transform:translateY(18px) scale(0.96);
            transition:transform .24s cubic-bezier(0.34,1.46,0.64,1);
            max-height:90vh; overflow-y:auto;
        }
        .overlay.open .modal { transform:translateY(0) scale(1); }
        .modal-head { padding:17px 21px 14px; display:flex; align-items:center; justify-content:space-between; border-bottom:1px solid var(--border); }
        .modal-title { font-size:15px; font-weight:700; }
        .modal-close-btn {
            width:25px; height:25px; background:var(--surface2); border:1px solid var(--border);
            border-radius:6px; cursor:pointer; color:var(--text-muted); font-size:13px;
            display:flex; align-items:center; justify-content:center; transition:background .12s,color .12s;
        }
        .modal-close-btn:hover { background:var(--border); color:var(--text); }
        .modal-body { padding:17px 21px; display:flex; flex-direction:column; gap:13px; }
        .form-group { display:flex; flex-direction:column; gap:5px; }
        .form-row   { display:grid; grid-template-columns:1fr 1fr; gap:11px; }
        .form-label { font-size:10.5px; font-weight:700; text-transform:uppercase; letter-spacing:.5px; color:var(--text-muted); }
        .form-label .req { color:var(--alta); }
        input[type="text"], textarea, select {
            background:var(--surface2); border:1px solid var(--border); border-radius:7px;
            padding:8px 10px; color:var(--text); font-size:13.5px; font-family:inherit;
            transition:border-color .15s,box-shadow .15s; width:100%;
        }
        input[type="text"]:focus, textarea:focus, select:focus {
            outline:none; border-color:var(--accent); box-shadow:0 0 0 3px rgba(99,102,241,.13);
        }
        textarea { resize:vertical; min-height:68px; }
        select option { background:#1a1a28; }
        .priority-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:7px; }
        .pri-opt {
            border:1.5px solid var(--border); border-radius:7px; padding:7px 5px;
            text-align:center; cursor:pointer; font-size:11px; font-weight:700;
            text-transform:uppercase; letter-spacing:.3px; transition:all .13px;
            color:var(--text-muted); user-select:none;
        }
        .pri-opt[data-v="ALTA"]:hover,  .pri-opt[data-v="ALTA"].sel  { border-color:var(--alta);  background:var(--alta-bg);  color:var(--alta);  }
        .pri-opt[data-v="MEDIA"]:hover, .pri-opt[data-v="MEDIA"].sel { border-color:var(--media); background:var(--media-bg); color:var(--media); }
        .pri-opt[data-v="BAJA"]:hover,  .pri-opt[data-v="BAJA"].sel  { border-color:var(--baja);  background:var(--baja-bg);  color:var(--baja);  }
        .modal-foot { padding:13px 21px; border-top:1px solid var(--border); display:flex; gap:8px; justify-content:flex-end; }
        .btn { padding:8px 17px; border-radius:7px; font-size:12.5px; font-weight:600; cursor:pointer; border:none; transition:all .13s; font-family:inherit; }
        .btn:active { transform:scale(0.96); }
        .btn-primary { background:var(--accent); color:#fff; }
        .btn-primary:hover { background:#4f46e5; }
        .btn-ghost { background:var(--surface2); color:var(--text-muted); border:1px solid var(--border); }
        .btn-ghost:hover { background:var(--border); color:var(--text); }

        /* ── Scrollbar ──────────────────────────────────────────────────── */
        ::-webkit-scrollbar { width:5px; }
        ::-webkit-scrollbar-track { background:var(--bg); }
        ::-webkit-scrollbar-thumb { background:var(--border); border-radius:3px; }
    </style>
</head>
<body>

<!-- ── HEADER ──────────────────────────────────────────────────────────────── -->
<div class="header" id="header">
    <div class="logo">
        <div class="logo-icon">🤖</div>
        <div>
            <div class="logo-name">Tareas <span>Claude</span></div>
            <div class="logo-sub">HyperTrader · Continuidad entre sesiones</div>
        </div>
    </div>

    <div class="header-stats">
        <div class="stat"><div class="stat-num active" id="cnt-active">0</div><div class="stat-label">Activas</div></div>
        <div class="stat"><div class="stat-num done"   id="cnt-done">0</div><div class="stat-label">Listas</div></div>
    </div>

    <!-- Sync pill -->
    <div class="sync-wrap" id="sync-wrap">
        <button class="sync-pill" id="sync-pill" onclick="toggleSyncPanel()">
            <span class="sync-dot" id="sync-dot"></span>
            <span id="sync-label">Conectar sync</span>
        </button>
        <div class="sync-panel" id="sync-panel">
            <!-- filled by JS -->
        </div>
    </div>

    <div class="header-actions">

// ══════════════════════════════════════════════════════════════════════════════

function setSyncStatus(s, detail) {
    syncStatus = s;
    const pill  = document.getElementById('sync-pill');
    const label = document.getElementById('sync-label');
    pill.className = 'sync-pill';

    if (s === 'notoken') {
        label.textContent = 'Conectar sync';
    } else if (s === 'loading') {
        pill.classList.add('syncing');
        label.textContent = 'Cargando…';
    } else if (s === 'saving') {
        pill.classList.add('syncing');
        label.textContent = 'Guardando…';
    } else if (s === 'synced') {
        pill.classList.add('synced');
        label.textContent = 'Sincronizado';
        localStorage.setItem('claude-sync-last', new Date().toLocaleTimeString('es', { hour:'2-digit', minute:'2-digit' }));
    } else if (s === 'error') {
        pill.classList.add('error');
        label.textContent = detail || 'Error de sync';
    }
    renderSyncPanel();
}

async function fetchFromGitHub(silent = false) {
    if (!ghToken) { setSyncStatus('notoken'); return; }
    if (!silent) setSyncStatus('loading');
    try {
        const r = await fetch(GH_API, {
            headers: {
                'Authorization': `Bearer ${ghToken}`,
                'Accept':        'application/vnd.github.v3+json',
                'Cache-Control': 'no-cache',
            }
        });
        if (r.status === 404) {
            // Archivo no existe aún — crearlo con el estado actual
            await pushToGitHub();
            return;
        }
        if (r.status === 401) { setSyncStatus('error', 'Token inválido'); return; }
        if (!r.ok) throw new Error(`GitHub ${r.status}`);

        const data   = await r.json();
        ghSha        = data.sha;   // guardar SHA para el próximo push
        localStorage.setItem(SHA_KEY, ghSha);

        const remote = JSON.parse(atob(data.content.replace(/\n/g, '')));
        const localTs  = state.lastModified  || 0;
        const remoteTs = remote.lastModified || 0;

        // Usar remoto si es más reciente O si local nunca se ha sincronizado
        if (remoteTs >= localTs && ((remote.tasks||[]).length + (remote.done||[]).length) > 0) {
            state = remote;
            saveLocal();
            render();
            if (!silent && remoteTs > localTs) toast('☁ Sincronizado desde GitHub');
        }
        setSyncStatus('synced');
    } catch(e) {
        setSyncStatus('error', 'Sin conexión');
        if (!silent) toast('⚠ No se pudo conectar: ' + e.message, 'warn');
    }
}

async function pushToGitHub() {
    if (!ghToken) return;
    setSyncStatus('saving');
    try {
        // PASO 1 — obtener SHA fresco (evita todos los errores 409/422)
        const getR = await fetch(GH_API, {
            headers: {
                'Authorization': `Bearer ${ghToken}`,
                'Accept':        'application/vnd.github.v3+json',
                'Cache-Control': 'no-cache',
            }
        });
        if (getR.ok) {
            const getData = await getR.json();
            ghSha = getData.sha;
            localStorage.setItem(SHA_KEY, ghSha);
        }

        // PASO 2 — escribir con SHA fresco
        const ts      = Date.now();
        const payload = { tasks: state.tasks, done: state.done, lastModified: ts };
        const content = btoa(unescape(encodeURIComponent(JSON.stringify(payload, null, 2))));
        const body    = { message: `sync: ${new Date().toISOString()}`, content };
        if (ghSha) body.sha = ghSha;

        const putR = await fetch(GH_API, {
            method: 'PUT',
            headers: {
                'Authorization': `Bearer ${ghToken}`,
                'Content-Type':  'application/json',
                'Accept':        'application/vnd.github.v3+json',
            },
            body: JSON.stringify(body),
        });

        if (!putR.ok) {
            const errBody = await putR.json().catch(() => ({}));
            throw new Error(`${putR.status}: ${errBody.message || ''}`);
        }

        const putData   = await putR.json();
        ghSha           = putData.content.sha;
        localStorage.setItem(SHA_KEY, ghSha);
        state.lastModified = ts;
        saveLocal();
        setSyncStatus('synced');
    } catch(e) {
        setSyncStatus('error', 'Error al guardar');
        toast('⚠ Sync falló: ' + e.message, 'warn');
    }
}

// Debounced auto-push after any change
function schedulePush() {
    clearTimeout(syncTimer);
    if (ghToken) syncTimer = setTimeout(() => pushToGitHub(), 1400);
}

                </div>
                ${syncStatus === 'error' ? `<button class="sync-btn-primary" style="width:100%" onclick="fetchFromGitHub()">Reintentar</button>` : ''}
            </div>`;
    }
}

// TASK ACTIONS
// ══════════════════════════════════════════════════════════════════════════════

function completeTask(id) {
    const idx = state.tasks.findIndex(t => t.id === id);
    if (idx === -1) return;
    const t = state.tasks[idx];
    const card = document.querySelector(`.task-card[data-id="${id}"]`);
    if (card) card.classList.add('removing');
    setTimeout(() => {
        state.tasks.splice(idx, 1);
        if (!state.done) state.done = [];
        state.done.unshift({ id: uid(), titulo: t.titulo, fecha: today() });
        save(); render();
        toast('✓ Tarea completada');
    }, 230);
}

function deleteTask(id) {
    const card = document.querySelector(`.task-card[data-id="${id}"]`);
    if (card) card.classList.add('removing');
    setTimeout(() => {
        state.tasks = state.tasks.filter(t => t.id !== id);
        save(); render();
        toast('Tarea eliminada', 'warn');
    }, 230);
}

function deleteDone(id) {
    const card = document.querySelector(`.completed-card[data-id="${id}"]`);
    if (card) { card.style.opacity='0'; card.style.transform='translateX(10px)'; card.style.transition='all .18s'; }
    setTimeout(() => {
        state.done = state.done.filter(d => d.id !== id);
        save(); render();
    }, 180);
}

function toggleDet(id) {
    const det  = document.getElementById(`det-${id}`);
    const chev = document.getElementById(`chev-${id}`);
    const lbl  = document.getElementById(`explbl-${id}`);
    const open = det.classList.toggle('open');
    chev.classList.toggle('open', open);
    lbl.textContent = open ? 'Ocultar detalles' : 'Ver contexto y archivos';
}

function toggleCompleted() {
    completedOpen = !completedOpen;
    document.getElementById('done-list').classList.toggle('collapsed', !completedOpen);
    document.getElementById('toggle-btn').textContent = completedOpen ? '▾' : '▸';
}

// ══════════════════════════════════════════════════════════════════════════════
// EXPORT / IMPORT (manual fallback)
// ══════════════════════════════════════════════════════════════════════════════

function exportarTareas() {
    const payload = { version:1, app:'Tareas Claude', exportado:new Date().toISOString(), ...state };
    const blob = new Blob([JSON.stringify(payload, null, 2)], { type:'application/json' });
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement('a');
    a.href     = url;
    a.download = `tareas-claude-${today()}.json`;
    a.click();
    URL.revokeObjectURL(url);
    toast(`↑ Exportadas ${(state.tasks||[]).length} activas y ${(state.done||[]).length} completadas`);
}

function importarTareas(e) {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
        try {
            const data = JSON.parse(ev.target.result);
            if (!Array.isArray(data.tasks) || !Array.isArray(data.done)) throw new Error('Formato inválido');
            const mode = confirm(`Importar ${data.tasks.length} tareas activas y ${data.done.length} completadas.\n\nOK = Reemplazar todo\nCancelar = Combinar`);
            if (mode) {
                state.tasks = data.tasks;
                state.done  = data.done;
            } else {
                const et = new Set(state.tasks.map(t=>t.id)), ed = new Set(state.done.map(d=>d.id));
                data.tasks.forEach(t => { if (!et.has(t.id)) state.tasks.push(t); });
                data.done.forEach(d  => { if (!ed.has(d.id)) state.done.push(d); });
            }
            save(); render();
            toast('↓ Tareas importadas correctamente');
        } catch(err) { toast('Error al importar: ' + err.message, 'err'); }
        e.target.value = '';
    };
    reader.readAsText(file);
}

// ══════════════════════════════════════════════════════════════════════════════
// COPY PROMPT
// ══════════════════════════════════════════════════════════════════════════════

function copiarPrompt() {
    navigator.clipboard.writeText('Lee TAREAS_CLAUDE.html en el Desktop y continúa donde quedamos')
        .then(() => toast('📋 Prompt copiado'));
}

// ══════════════════════════════════════════════════════════════════════════════
// NEW TASK MODAL
// ══════════════════════════════════════════════════════════════════════════════

function openModal() {
    document.getElementById('overlay').classList.add('open');
    closeSyncPanel();
    setTimeout(() => document.getElementById('f-titulo').focus(), 80);
}
function closeModal() {
    document.getElementById('overlay').classList.remove('open');
    resetForm();
}
function handleOverlay(e) { if (e.target === document.getElementById('overlay')) closeModal(); }

function selPri(el) {
    document.querySelectorAll('.pri-opt').forEach(o => o.classList.remove('sel'));
    el.classList.add('sel'); curPri = el.dataset.v;
}
function resetForm() {
    ['f-titulo','f-proyecto','f-quehace','f-contexto','f-archivos'].forEach(id => { document.getElementById(id).value = ''; });
    document.getElementById('f-estado').value = 'Pendiente';
    curPri = 'ALTA';
    document.querySelectorAll('.pri-opt').forEach(o => o.classList.toggle('sel', o.dataset.v === 'ALTA'));
}
function addTask() {
    const titulo = document.getElementById('f-titulo').value.trim();
    if (!titulo) {
        const el = document.getElementById('f-titulo');
        el.style.borderColor = 'var(--alta)'; el.focus();
        setTimeout(() => el.style.borderColor = '', 1800); return;
    }
    if (!state.tasks) state.tasks = [];
    state.tasks.unshift({
        id:        uid(),
        titulo,
        prioridad: curPri,
        proyecto:  document.getElementById('f-proyecto').value.trim(),
        queHacer:  document.getElementById('f-quehace').value.trim() || '(por definir)',
        contexto:  document.getElementById('f-contexto').value.trim(),
        archivos:  document.getElementById('f-archivos').value.trim(),
        estado:    document.getElementById('f-estado').value,
        fecha:     today(),
    });
    save(); closeModal(); render();
    toast('✓ Tarea agregada');
    setTimeout(() => document.getElementById('active-list').scrollIntoView({ behavior:'smooth', block:'start' }), 80);
}

// ══════════════════════════════════════════════════════════════════════════════
// KEYBOARD SHORTCUTS
// ══════════════════════════════════════════════════════════════════════════════

document.addEventListener('keydown', e => {
    if ((e.metaKey||e.ctrlKey) && e.key==='n') { e.preventDefault(); openModal(); return; }
    if ((e.metaKey||e.ctrlKey) && e.key==='e') { e.preventDefault(); exportarTareas(); return; }
    if (e.key==='Escape') { closeModal(); closeSyncPanel(); }
    if (e.key==='Enter' && e.target.tagName!=='TEXTAREA' && e.target.tagName!=='SELECT'
        && document.getElementById('overlay').classList.contains('open')) addTask();
});

// ══════════════════════════════════════════════════════════════════════════════
// INIT
// ══════════════════════════════════════════════════════════════════════════════

render();
// Initialize sync status
if (ghToken) {
    setSyncStatus('loading');
    fetchFromGitHub();   // pull latest on every page load
} else {
    setSyncStatus('notoken');
}
</script>
